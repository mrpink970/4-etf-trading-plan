name: Update ETF Data

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install yfinance openpyxl

      - name: Run update script
        run: |
          python update_4etf_daily_data.py 4_ETF_Trading_Workbook_Template.xlsx

      - name: Commit updated workbook
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add 4_ETF_Trading_Workbook_Template.xlsx
          git commit -m "Daily ETF update" || echo "No changes"
          git push
