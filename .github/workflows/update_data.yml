name: Update ETF Data

on:
  schedule:
    - cron: '15 23 * * 1-5'   # 23:15 UTC weekdays
    - cron: '30 23 * * 1-5'   # 23:30 UTC weekdays (backup)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install yfinance pandas numpy openpyxl

      - name: Run update script
        run: |
          python update_4etf_daily_data.py 4_ETF_Trading_Workbook_Template.xlsx

      - name: Commit updated workbook
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          rm -f 4_ETF_Trading_Workbook_Template.bak.xlsx
          git add 4_ETF_Trading_Workbook_Template.xlsx
          git diff --cached --quiet && echo "No changes" || git commit -m "Daily ETF update"
          git push || echo "Nothing to push"
